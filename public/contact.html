<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ - BUZZLY NOW</title>
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
    }
    h1 { color: #ffcc00; }
    form {
      margin-top: 30px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      box-sizing: border-box;
    }
    textarea {
      min-height: 200px;
      resize: vertical;
    }
    button {
      background: #ffcc00;
      color: #000;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #ffb800;
    }
    .success {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>お問い合わせ</h1>

<p>BUZZLY NOWに関するご質問、ご不明な点、または権利に関するご懸念がある場合は、下記のフォームからお気軽にお問い合わせください。</p>

<p>通常、営業日3日以内にご返信いたします。</p>

<form id="contactForm">
  <label for="name">お名前 *</label>
  <input type="text" id="name" name="name" required />

  <label for="email">メールアドレス *</label>
  <input type="email" id="email" name="email" required />

  <label for="subject">件名 *</label>
  <input type="text" id="subject" name="subject" required />

  <label for="category">カテゴリ *</label>
  <select id="category" name="category" required>
    <option value="">選択してください</option>
    <option value="general">一般的なお問い合わせ</option>
    <option value="bug">バグ報告</option>
    <option value="feature">機能リクエスト</option>
    <option value="privacy">プライバシー関連</option>
    <option value="copyright">著作権/コンテンツ削除リクエスト</option>
    <option value="ads">広告に関するお問い合わせ</option>
    <option value="other">その他</option>
  </select>

  <label for="message">メッセージ *</label>
  <textarea id="message" name="message" required></textarea>

  <button type="submit">送信</button>
</form>

<div class="success" id="successMessage">
  ✓ ご送信ありがとうございます。確認いただきました。
</div>

<h2>その他のお問い合わせ方法</h2>

<ul>
  <li>プライバシーポリシーについて：<a href="/privacy.html">プライバシーポリシー</a>を参照してください</li>
  <li>利用規約について：<a href="/terms.html">利用規約</a>を参照してください</li>
  <li>著作権侵害報告：<a href="mailto:contact@buzzly-now.com">contact@buzzly-now.com</a></li>
</ul>

<script>
  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const formData = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      subject: document.getElementById("subject").value,
      category: document.getElementById("category").value,
      message: document.getElementById("message").value,
      timestamp: new Date().toISOString()
    };

    let submissions = JSON.parse(localStorage.getItem("contactSubmissions") || "[]");
    submissions.push(formData);
    localStorage.setItem("contactSubmissions", JSON.stringify(submissions));

    document.getElementById("contactForm").reset();
    document.getElementById("successMessage").style.display = "block";
    
    setTimeout(() => {
      document.getElementById("successMessage").style.display = "none";
    }, 3000);
  });
</script>

<hr />

<p style="color: #999; font-size: 0.9em;">© 2025 BUZZLY NOW. All rights reserved.</p>

</body>
</html>
